<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Web制作スケジュール管理</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<style>
:root {
  --sidebar-width: 280px;
  --row-height: 40px;
  --cell-width: 36px;
  --header-height: 60px;
  --primary: #1a1a2e;
  --primary-light: rgba(26, 26, 46, 0.06);
  --accent: #fff100;
  --border: #e8e8e0;
  --bg: #FCFCF3;
  --bg-white: #fff;
  --text: #333;
  --text-light: #888;
  --sunday: #e74c3c;
  --saturday: #2980b9;
  --holiday: #e74c3c;
  --today-bg: #fff9db;
  --success: #27ae60;
  --radius: 8px;
  --shadow-sm: 0 1px 3px rgba(0,0,0,.06);
  --shadow-md: 0 4px 12px rgba(0,0,0,.08);
  --shadow-lg: 0 4px 20px rgba(0,0,0,.1);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Noto Sans JP', 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', 'Meiryo', sans-serif;
  background: var(--bg);
  color: var(--text);
  overflow: hidden;
  height: 100vh;
}

#app {
  display: flex;
  flex-direction: column;
  height: 100vh;
}

/* Header */
.app-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 24px;
  background: var(--primary);
  z-index: 100;
  flex-shrink: 0;
  box-shadow: 0 2px 8px rgba(26,26,46,.15);
}

.header-logo {
  display: flex;
  align-items: center;
  gap: 14px;
}

.header-logo svg {
  height: 20px;
  width: auto;
  overflow: visible;
  flex-shrink: 0;
}

.header-logo h1 {
  font-size: 15px;
  font-weight: 600;
  color: rgba(255,255,255,.7);
  letter-spacing: .5px;
}

.header-controls {
  display: flex;
  gap: 8px;
  align-items: center;
}

.header-controls button {
  padding: 6px 14px;
  border: 1px solid rgba(255,255,255,.2);
  border-radius: var(--radius);
  background: rgba(255,255,255,.08);
  cursor: pointer;
  font-size: 12px;
  font-weight: 500;
  color: rgba(255,255,255,.85);
  transition: all .2s;
  font-family: inherit;
}

.header-controls button:hover {
  background: rgba(255,255,255,.18);
  border-color: rgba(255,255,255,.35);
}
#saveBtn.unsaved {
  background: rgba(255,152,0,.6);
  border-color: rgba(255,152,0,.8);
  animation: savePulse 1.5s ease-in-out infinite;
}
@keyframes savePulse {
  0%, 100% { opacity: 1; }
  50% { opacity: .7; }
}

.month-nav {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 14px;
  font-weight: 600;
  color: #fff;
}

.month-nav button {
  width: 30px;
  height: 30px;
  border: 1px solid rgba(255,255,255,.2);
  border-radius: var(--radius);
  background: rgba(255,255,255,.08);
  cursor: pointer;
  font-size: 14px;
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all .2s;
}

.month-nav button:hover { background: rgba(255,255,255,.18); }

/* Project title bar */
.project-title-bar {
  display: flex;
  align-items: center;
  padding: 10px 24px;
  background: var(--bg-white);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  gap: 16px;
}

.project-title {
  font-size: 18px;
  font-weight: 700;
  color: var(--primary);
  cursor: pointer;
  padding: 4px 10px;
  border-radius: var(--radius);
  border: 1px solid transparent;
  min-width: 120px;
  transition: all .2s;
  font-family: inherit;
}

.project-title:hover {
  background: var(--primary-light);
  border-color: var(--border);
}

.project-title-input {
  font-size: 18px;
  font-weight: 700;
  color: var(--primary);
  padding: 4px 10px;
  border-radius: var(--radius);
  border: 2px solid var(--primary);
  outline: none;
  font-family: inherit;
  min-width: 280px;
  background: var(--bg-white);
  box-shadow: 0 0 0 3px rgba(26, 26, 46, 0.08);
}

/* Drag palette */
.drag-palette {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 24px;
  background: var(--bg-white);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.drag-palette label {
  font-size: 12px;
  color: var(--text-light);
  font-weight: 600;
}

.drag-item {
  padding: 5px 14px;
  border-radius: var(--radius);
  font-size: 12px;
  font-weight: 600;
  cursor: grab;
  user-select: none;
  white-space: nowrap;
  transition: all .2s;
}

.drag-item:active { cursor: grabbing; }

.drag-item[data-type="phase"] {
  background: rgba(26, 26, 46, 0.08);
  color: var(--primary);
  border: 1px dashed rgba(26, 26, 46, 0.3);
}

.drag-item[data-type="phase"]:hover {
  background: rgba(26, 26, 46, 0.14);
}

.drag-item[data-type="task"] {
  background: rgba(39, 174, 96, 0.08);
  color: #1a8a4a;
  border: 1px dashed rgba(39, 174, 96, 0.4);
}

.drag-item[data-type="task"]:hover {
  background: rgba(39, 174, 96, 0.14);
}

/* Main area */
.gantt-container {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* Sidebar */
.sidebar {
  width: var(--sidebar-width);
  min-width: var(--sidebar-width);
  background: var(--bg-white);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  z-index: 10;
}

.sidebar-header {
  height: var(--header-height);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 16px;
  font-size: 12px;
  font-weight: 700;
  color: var(--text-light);
  background: #f7f7f0;
  letter-spacing: .5px;
  text-transform: uppercase;
}

.sidebar-body {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
}

.task-row {
  height: var(--row-height);
  display: flex;
  align-items: center;
  border-bottom: 1px solid var(--border);
  padding: 0 8px;
  position: relative;
  transition: background .15s;
}

.task-row:hover { background: rgba(26, 26, 46, 0.03); }

.task-row.drop-target-above { box-shadow: 0 -2px 0 0 var(--primary); }
.task-row.drop-target-below { box-shadow: 0 2px 0 0 var(--primary); }
.task-row.drop-target-inside { background: rgba(255, 241, 0, 0.15); }
.task-row.dragging { opacity: 0.4; }

.task-row.is-phase {
  background: #f7f7f0;
  font-weight: 700;
  font-size: 13px;
}

.task-row.is-task {
  font-size: 12px;
  padding-left: 24px;
}

.task-toggle {
  width: 20px;
  height: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 10px;
  color: var(--text-light);
  flex-shrink: 0;
  margin-right: 4px;
  border-radius: 4px;
  transition: background .15s;
}

.task-toggle:hover { background: rgba(26, 26, 46, 0.08); }

.task-label {
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  cursor: default;
}

.task-label.editable:hover {
  background: rgba(26, 26, 46, 0.05);
  border-radius: 4px;
  padding: 1px 4px;
  margin: -1px -4px;
}

.task-actions {
  display: none;
  gap: 2px;
}

.task-row:hover .task-actions { display: flex; }

.task-actions button {
  width: 22px;
  height: 22px;
  border: none;
  background: transparent;
  cursor: pointer;
  border-radius: 4px;
  font-size: 12px;
  color: var(--text-light);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background .15s;
}

.task-actions button:hover { background: rgba(26, 26, 46, 0.08); }
.task-actions button.delete:hover { background: rgba(231, 76, 60, 0.1); color: #e74c3c; }

/* Color indicator */
.task-color {
  width: 4px;
  height: 24px;
  border-radius: 2px;
  margin-right: 6px;
  flex-shrink: 0;
}

/* Add column */
.add-column {
  width: 40px;
  min-width: 40px;
  background: var(--bg-white);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  z-index: 10;
}

.add-column-header {
  height: var(--header-height);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  font-weight: 700;
  color: var(--text-light);
  background: #f7f7f0;
}

.add-column-body {
  flex: 1;
  overflow: hidden;
}

.add-column-row {
  height: var(--row-height);
  display: flex;
  align-items: center;
  justify-content: center;
  border-bottom: 1px solid var(--border);
}

/* Timeline */
.timeline-wrapper {
  flex: 1;
  overflow: auto;
  position: relative;
}

.timeline-header {
  position: sticky;
  top: 0;
  z-index: 5;
  background: #f7f7f0;
  border-bottom: 1px solid var(--border);
}

.timeline-table {
  border-collapse: collapse;
  table-layout: fixed;
}

.timeline-table th {
  padding: 0;
  border: none;
}

.timeline-table .month-cell {
  font-size: 12px;
  font-weight: 700;
  color: var(--primary);
  text-align: left;
  padding-left: 10px;
  height: 28px;
  background: #eeeee6;
  border-left: 2px solid #ccc;
  border-bottom: none;
}

.timeline-table .month-cell:first-child {
  border-left: none;
}

.timeline-table .day-cell {
  width: var(--cell-width);
  min-width: var(--cell-width);
  max-width: var(--cell-width);
  height: 32px;
  font-size: 10px;
  color: var(--text-light);
  text-align: center;
  vertical-align: middle;
  cursor: default;
  border-left: 1px solid #f0f0e8;
}

.day-cell .day-num { font-weight: 600; font-size: 11px; display: block; }
.day-cell .day-name { font-size: 9px; display: block; }

.day-cell.sunday { color: var(--sunday); background: rgba(231, 76, 60, 0.06); }
.day-cell.saturday { color: var(--saturday); background: rgba(41, 128, 185, 0.06); }
.day-cell.holiday { color: var(--holiday); background: rgba(231, 76, 60, 0.06); }
.day-cell.today { background: var(--today-bg); }
.day-cell.month-start { border-left: 2px solid #ccc; }

.timeline-body {
  position: relative;
}

.timeline-row {
  height: var(--row-height);
  position: relative;
  border-bottom: 1px solid var(--border);
  display: flex;
}

.timeline-cell {
  width: var(--cell-width);
  min-width: var(--cell-width);
  height: 100%;
  border-left: 1px solid #f5f5ed;
}

.timeline-cell.sunday { background: rgba(231, 76, 60, 0.04); }
.timeline-cell.saturday { background: rgba(41, 128, 185, 0.04); }
.timeline-cell.holiday { background: rgba(231, 76, 60, 0.04); }
.timeline-cell.today { background: var(--today-bg); }
.timeline-cell.month-start { border-left: 2px solid #ccc; }

/* Gantt bars */
.gantt-bar {
  position: absolute;
  top: 8px;
  height: 24px;
  border-radius: 6px;
  cursor: pointer;
  display: flex;
  align-items: center;
  padding: 0 8px;
  font-size: 10px;
  font-weight: 600;
  color: #fff;
  z-index: 2;
  user-select: none;
  min-width: 20px;
  overflow: visible;
  white-space: nowrap;
  box-shadow: var(--shadow-sm);
  transition: box-shadow .15s;
}

.gantt-bar:hover { z-index: 6; }

.gantt-bar:hover { box-shadow: var(--shadow-md); filter: brightness(1.08); z-index: 6; }

.gantt-bar .bar-resize-left,
.gantt-bar .bar-resize-right {
  position: absolute;
  top: 0;
  width: 6px;
  height: 100%;
  cursor: ew-resize;
}

.gantt-bar .bar-resize-left { left: 0; }
.gantt-bar .bar-resize-right { right: 0; }

.bar-label {
  pointer-events: none;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  max-width: calc(100% - 12px);
}

/* Bar delete button */
.bar-delete {
  position: absolute;
  top: -8px;
  right: -8px;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: #e74c3c;
  color: #fff;
  font-size: 11px;
  line-height: 18px;
  text-align: center;
  cursor: pointer;
  display: none;
  z-index: 10;
  box-shadow: 0 1px 4px rgba(0,0,0,.25);
}

.gantt-bar:hover .bar-delete { display: block; }
.bar-delete:hover { background: #c0392b; transform: scale(1.15); }

/* Bar add button */
.bar-add-btn {
  width: 22px;
  height: 22px;
  border-radius: 4px;
  background: rgba(26, 26, 46, 0.04);
  border: 1px solid rgba(26, 26, 46, 0.15);
  color: var(--text-light);
  font-size: 13px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: all .15s;
}

.bar-add-btn:hover { background: rgba(26, 26, 46, 0.12); border-color: rgba(26, 26, 46, 0.4); color: var(--primary); }

/* Today line */
.today-line {
  position: absolute;
  top: 0;
  bottom: 0;
  width: 2px;
  background: var(--sunday);
  z-index: 3;
  pointer-events: none;
}

/* Context menu */
.context-menu {
  position: fixed;
  background: var(--bg-white);
  border: 1px solid var(--border);
  border-radius: 10px;
  box-shadow: var(--shadow-lg);
  z-index: 1000;
  min-width: 170px;
  padding: 4px;
  display: none;
}

.context-menu.show { display: block; }

.context-menu-item {
  padding: 8px 12px;
  font-size: 13px;
  cursor: pointer;
  border-radius: 6px;
  display: flex;
  align-items: center;
  gap: 8px;
  transition: background .15s;
}

.context-menu-item:hover { background: var(--primary-light); }
.context-menu-item.danger { color: #e74c3c; }
.context-menu-item.danger:hover { background: rgba(231, 76, 60, 0.08); }

/* Color picker */
.color-picker {
  display: flex;
  gap: 4px;
  padding: 8px 12px;
}

.color-swatch {
  width: 20px;
  height: 20px;
  border-radius: 50%;
  cursor: pointer;
  border: 2px solid transparent;
  transition: transform .15s;
}

.color-swatch:hover { border-color: var(--primary); transform: scale(1.2); }

/* Modal */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(26, 26, 46, 0.35);
  z-index: 500;
  display: none;
  align-items: center;
  justify-content: center;
}

.modal-overlay.show { display: flex; }

.modal {
  background: var(--bg-white);
  border-radius: 16px;
  padding: 28px;
  width: 380px;
  box-shadow: 0 8px 32px rgba(26, 26, 46, 0.18);
}

.modal h3 { margin-bottom: 18px; font-size: 16px; color: var(--primary); font-weight: 700; }

.modal input {
  width: 100%;
  padding: 10px 14px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  font-size: 14px;
  margin-bottom: 14px;
  font-family: inherit;
  transition: border-color .2s, box-shadow .2s;
  background: var(--bg);
}

.modal input:focus {
  outline: none;
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(26, 26, 46, 0.08);
}

.modal-actions {
  display: flex;
  justify-content: flex-end;
  gap: 8px;
}

.modal-actions button {
  padding: 8px 20px;
  border-radius: var(--radius);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  border: 1px solid var(--border);
  background: var(--bg-white);
  font-family: inherit;
  transition: all .2s;
}

.modal-actions button:hover { background: var(--bg); }

.modal-actions button.primary {
  background: var(--primary);
  color: #fff;
  border-color: var(--primary);
}

.modal-actions button.primary:hover {
  background: #2a2a42;
}

/* Footer */
.app-footer {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 6px 24px;
  background: var(--primary);
  flex-shrink: 0;
  gap: 8px;
}

.app-footer svg { height: 14px; width: auto; }

.app-footer span {
  font-size: 10px;
  color: rgba(255,255,255,.5);
  letter-spacing: .3px;
}

/* View toggle active */
.header-controls button.active {
  background: rgba(255,255,255,.25);
  border-color: rgba(255,255,255,.5);
  color: #fff;
}

/* ========== VERTICAL VIEW ========== */
.vertical-view {
  flex: 1;
  overflow: auto;
  display: none;
}

.vertical-view.active { display: block; }
.gantt-container.hidden { display: none; }

.v-table {
  border-collapse: collapse;
  min-width: 100%;
}

.v-table th,
.v-table td {
  border: 1px solid var(--border);
  text-align: center;
  white-space: nowrap;
}

.v-table thead th {
  position: sticky;
  top: 0;
  z-index: 5;
  background: #f7f7f0;
  padding: 6px 4px;
  font-size: 12px;
  font-weight: 700;
  color: var(--primary);
  min-width: 120px;
}

.v-table thead th.v-date-header {
  min-width: 100px;
  width: 100px;
  background: #eeeee6;
  position: sticky;
  left: 0;
  z-index: 10;
}

.v-table thead th.v-phase {
  font-size: 11px;
  color: #fff;
  padding: 8px 6px;
  letter-spacing: .3px;
}

.v-table thead th.v-task {
  font-size: 11px;
  font-weight: 500;
  padding: 8px 6px;
}

.v-table tbody td.v-date-cell {
  position: sticky;
  left: 0;
  z-index: 3;
  background: #f7f7f0;
  font-size: 12px;
  font-weight: 600;
  padding: 4px 10px;
  text-align: left;
  min-width: 100px;
}

.v-table tbody td.v-date-cell.sunday { color: var(--sunday); background: rgba(231,76,60,.06); }
.v-table tbody td.v-date-cell.saturday { color: var(--saturday); background: rgba(41,128,185,.06); }
.v-table tbody td.v-date-cell.holiday { color: var(--holiday); background: rgba(231,76,60,.06); }
.v-table tbody td.v-date-cell.today { background: var(--today-bg); }

.v-table tbody td.v-bar-cell {
  padding: 0;
  height: 28px;
  min-width: 120px;
}

.v-table tbody td.v-bar-cell.sunday-bg { background: rgba(231,76,60,.03); }
.v-table tbody td.v-bar-cell.saturday-bg { background: rgba(41,128,185,.03); }
.v-table tbody td.v-bar-cell.holiday-bg { background: rgba(231,76,60,.03); }
.v-table tbody td.v-bar-cell.today-bg { background: var(--today-bg); }

.v-bar-fill {
  height: 20px;
  margin: 4px 2px;
  border-radius: 4px;
}

.v-today-row td {
  border-top: 2px solid var(--sunday) !important;
}

/* Sync status */
.sync-status {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  color: rgba(255,255,255,.6);
  margin-right: 8px;
}
.sync-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: #888;
  transition: background .3s;
}
.sync-dot.connected { background: #27ae60; }
.sync-dot.syncing { background: #f39c12; animation: pulse .8s infinite; }
.sync-dot.offline { background: #e74c3c; }
@keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:.4; } }

/* Project selector screen */
.project-selector {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100vh;
  background: var(--bg);
  padding: 40px;
}
.project-selector .selector-card {
  background: var(--bg-white);
  border-radius: 16px;
  box-shadow: var(--shadow-lg);
  padding: 48px;
  max-width: 520px;
  width: 100%;
  text-align: center;
}
.project-selector h2 {
  font-size: 24px;
  color: var(--primary);
  margin-bottom: 8px;
}
.project-selector p {
  font-size: 14px;
  color: var(--text-light);
  margin-bottom: 32px;
}
.project-selector .new-project-form {
  display: flex;
  gap: 8px;
  margin-bottom: 24px;
}
.project-selector .new-project-form input {
  flex: 1;
  padding: 10px 16px;
  border: 2px solid var(--border);
  border-radius: var(--radius);
  font-size: 14px;
  font-family: inherit;
  outline: none;
  transition: border-color .2s;
}
.project-selector .new-project-form input:focus {
  border-color: var(--primary);
}
.project-selector .new-project-form button {
  padding: 10px 24px;
  background: var(--primary);
  color: #fff;
  border: none;
  border-radius: var(--radius);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
  white-space: nowrap;
  transition: opacity .2s;
}
.project-selector .new-project-form button:hover { opacity: .85; }
.project-list {
  text-align: left;
  max-height: 300px;
  overflow-y: auto;
}
.project-list-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 8px;
  cursor: pointer;
  transition: all .2s;
  background: var(--bg);
}
.project-list-item:hover {
  background: var(--primary-light);
  border-color: var(--primary);
}
.project-list-item .proj-name {
  font-weight: 600;
  color: var(--primary);
}
.project-list-item .proj-date {
  font-size: 12px;
  color: var(--text-light);
}
.project-list-item .proj-delete {
  color: #e74c3c;
  font-size: 14px;
  padding: 4px 8px;
  border: none;
  background: none;
  cursor: pointer;
  opacity: 0;
  transition: opacity .2s;
}
.project-list-item:hover .proj-delete { opacity: 1; }
.firebase-not-configured {
  background: #fff9db;
  border: 1px solid #f39c12;
  border-radius: var(--radius);
  padding: 16px;
  margin-top: 16px;
  font-size: 13px;
  color: #856404;
  text-align: left;
  line-height: 1.6;
}
.firebase-not-configured code {
  background: rgba(0,0,0,.06);
  padding: 2px 6px;
  border-radius: 3px;
  font-size: 12px;
}

/* Scrollbar */
::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: #f0f0e8; }
::-webkit-scrollbar-thumb { background: #ccc; border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: #aaa; }

/* Sync scroll */
.sidebar-body { scrollbar-width: none; }
.sidebar-body::-webkit-scrollbar { display: none; }
.add-column-body { scrollbar-width: none; overflow: hidden; }
.add-column-body::-webkit-scrollbar { display: none; }
</style>

<script>
// ========== FIREBASE CONFIG ==========
// ★ ここにFirebaseプロジェクトの設定を入力してください
// Firebase Console → プロジェクト設定 → マイアプリ → Firebase SDK snippet → 構成
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyAQu8qrVH0KZ_qLnJZzx7GbIVvpqYpzj0M",
  authDomain: "growup-schedule.firebaseapp.com",
  databaseURL: "https://growup-schedule-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "growup-schedule",
  storageBucket: "growup-schedule.firebasestorage.app",
  messagingSenderId: "1052371891399",
  appId: "1:1052371891399:web:fb8ce934d2e98898e83ae2"
};

let firebaseEnabled = false;
let db = null;
let currentProjectId = null;
let firebaseListener = null;
let ignoreNextFirebaseUpdate = false;

function isFirebaseConfigured() {
  return FIREBASE_CONFIG.apiKey && FIREBASE_CONFIG.databaseURL && FIREBASE_CONFIG.projectId;
}

function initFirebase() {
  if (!isFirebaseConfigured()) {
    console.log('Firebase未設定 - ローカルモードで動作');
    return false;
  }
  try {
    firebase.initializeApp(FIREBASE_CONFIG);
    db = firebase.database();
    firebaseEnabled = true;
    console.log('Firebase接続成功');
    return true;
  } catch(e) {
    console.error('Firebase初期化エラー:', e);
    return false;
  }
}

function setSyncStatus(status) {
  const dot = document.getElementById('syncDot');
  const label = document.getElementById('syncLabel');
  const container = document.getElementById('syncStatus');
  if (!dot || !label || !container) return;
  if (!firebaseEnabled) { container.style.display = 'none'; return; }
  container.style.display = 'flex';
  dot.className = 'sync-dot ' + status;
  switch(status) {
    case 'connected': label.textContent = '同期中'; break;
    case 'syncing': label.textContent = '保存中...'; break;
    case 'offline': label.textContent = 'オフライン'; break;
  }
}

// ========== PROJECT MANAGEMENT ==========
function getProjectListFromLocal() {
  try {
    return JSON.parse(localStorage.getItem('gantt_projects') || '[]');
  } catch(e) { return []; }
}

function saveProjectListToLocal(list) {
  localStorage.setItem('gantt_projects', JSON.stringify(list));
}

function generateProjectSlug() {
  // Generate a short random ID for URL-safe project slugs
  const chars = 'abcdefghijklmnopqrstuvwxyz0123456789';
  let id = '';
  for (let i = 0; i < 8; i++) id += chars[Math.floor(Math.random() * chars.length)];
  return id;
}

function showProjectSelector() {
  document.getElementById('projectSelector').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
  if (!isFirebaseConfigured()) {
    document.getElementById('firebaseWarning').style.display = 'block';
  }
  renderProjectList();
}

function renderProjectList() {
  const list = document.getElementById('projectList');
  const projects = getProjectListFromLocal();

  if (projects.length === 0) {
    list.innerHTML = '<p style="text-align:center;color:#888;font-size:13px;padding:16px;">プロジェクトがありません</p>';
    return;
  }

  list.innerHTML = '';
  projects.sort((a, b) => (b.updatedAt || 0) - (a.updatedAt || 0));
  projects.forEach(p => {
    const item = document.createElement('div');
    item.className = 'project-list-item';
    const dateStr = p.updatedAt ? new Date(p.updatedAt).toLocaleDateString('ja-JP') : '';
    item.innerHTML = `
      <div>
        <div class="proj-name">${p.name}</div>
        <div class="proj-date">${dateStr}</div>
      </div>
      <button class="proj-delete" onclick="event.stopPropagation();deleteProject('${p.id}')" title="削除">×</button>
    `;
    item.onclick = () => openProject(p.id);
    list.appendChild(item);
  });
}

function createNewProject() {
  const input = document.getElementById('newProjectName');
  const name = input.value.trim();
  if (!name) { input.focus(); return; }

  const slug = generateProjectSlug();
  const projects = getProjectListFromLocal();

  projects.push({
    id: slug,
    name: name,
    createdAt: Date.now(),
    updatedAt: Date.now()
  });
  saveProjectListToLocal(projects);
  input.value = '';

  // Set project title and initialize
  projectTitle = name;
  openProject(slug, true);
}

function deleteProject(id) {
  if (!confirm('このプロジェクトを削除しますか？')) return;
  let projects = getProjectListFromLocal();
  projects = projects.filter(p => p.id !== id);
  saveProjectListToLocal(projects);

  // Remove local data
  localStorage.removeItem('gantt_tasks_' + id);
  localStorage.removeItem('gantt_title_' + id);

  // Remove from Firebase
  if (firebaseEnabled && db) {
    db.ref('projects/' + id).remove();
  }

  renderProjectList();
}

function openProject(id, isNew) {
  currentProjectId = id;
  window.location.hash = '#/' + id;

  document.getElementById('projectSelector').style.display = 'none';
  document.getElementById('app').style.display = 'flex';

  // Detach previous Firebase listener
  if (firebaseListener && db) {
    db.ref('projects/' + firebaseListener).off();
    firebaseListener = null;
  }

  if (isNew) {
    // New project: use default tasks, projectTitle already set by caller
    initDefaultTasks();
    localStorage.setItem('gantt_title_' + id, projectTitle);
    localStorage.setItem('gantt_tasks_' + id, JSON.stringify(tasks));

    // Write to Firebase immediately (before attaching listener)
    if (firebaseEnabled && db) {
      db.ref('projects/' + id).set({
        tasks: tasks,
        title: projectTitle,
        updatedAt: firebase.database.ServerValue.TIMESTAMP
      });
    }
  } else {
    // Load existing project
    loadProject(id);
  }

  initCalendar();
  renderTitle();
  render();
  goToday();

  // Attach Firebase listener for real-time sync
  if (firebaseEnabled && db) {
    attachFirebaseListener(id);
  }
}

function loadProject(id) {
  // Try Firebase first, then localStorage
  if (firebaseEnabled && db) {
    // Firebase data will come via listener; load local as interim
    loadFromLocal(id);
  } else {
    loadFromLocal(id);
  }
}

function loadFromLocal(id) {
  const saved = localStorage.getItem('gantt_tasks_' + id);
  if (saved) {
    try {
      tasks = JSON.parse(saved);
      nextId = tasks.length > 0 ? Math.max(...tasks.map(t => t.id)) + 1 : 1;
    } catch(e) {
      initDefaultTasks();
    }
  } else {
    // Migration: try loading from old key for backward compatibility
    const oldSaved = localStorage.getItem('gantt_tasks');
    if (oldSaved) {
      try {
        tasks = JSON.parse(oldSaved);
        nextId = tasks.length > 0 ? Math.max(...tasks.map(t => t.id)) + 1 : 1;
      } catch(e) {
        initDefaultTasks();
      }
    } else {
      initDefaultTasks();
    }
  }
  const savedTitle = localStorage.getItem('gantt_title_' + id);
  if (savedTitle) {
    projectTitle = savedTitle;
  } else {
    // Try getting name from project list
    const projects = getProjectListFromLocal();
    const proj = projects.find(p => p.id === id);
    projectTitle = proj ? proj.name : (localStorage.getItem('gantt_project_title') || 'プロジェクト名を入力');
  }
}

function attachFirebaseListener(id) {
  firebaseListener = id;
  setSyncStatus('syncing');
  let isFirstCallback = true;

  const ref = db.ref('projects/' + id);

  // Listen for connection state
  db.ref('.info/connected').on('value', (snap) => {
    setSyncStatus(snap.val() ? 'connected' : 'offline');
  });

  // Listen for data changes
  ref.on('value', (snapshot) => {
    if (ignoreNextFirebaseUpdate) {
      ignoreNextFirebaseUpdate = false;
      return;
    }

    const data = snapshot.val();

    if (isFirstCallback) {
      isFirstCallback = false;
      if (!data || !data.tasks) {
        // Firebase has no data yet — push local data to Firebase
        if (tasks.length > 0) {
          ignoreNextFirebaseUpdate = true;
          ref.set({
            tasks: tasks,
            title: projectTitle,
            updatedAt: firebase.database.ServerValue.TIMESTAMP
          });
        }
        setSyncStatus('connected');
        return;
      }
    }

    if (data && data.tasks) {
      tasks = data.tasks;
      nextId = tasks.length > 0 ? Math.max(...tasks.map(t => t.id)) + 1 : 1;
      if (data.title) {
        projectTitle = data.title;
        renderTitle();
      }
      render();
      // Also save to local as cache
      localStorage.setItem('gantt_tasks_' + id, JSON.stringify(tasks));
      localStorage.setItem('gantt_title_' + id, projectTitle);
      setSyncStatus('connected');
    }
  }, (error) => {
    console.error('Firebase read error:', error);
    setSyncStatus('offline');
  });
}

function backToProjects() {
  // Detach Firebase listener
  if (firebaseListener && db) {
    db.ref('projects/' + firebaseListener).off();
    db.ref('.info/connected').off();
    firebaseListener = null;
  }
  currentProjectId = null;
  window.location.hash = '';
  showProjectSelector();
}

let hasUnsavedChanges = false;
function markUnsaved() {
  hasUnsavedChanges = true;
  const btn = document.getElementById('saveBtn');
  if (btn) {
    btn.classList.add('unsaved');
    btn.textContent = '● 保存';
  }
}
function markSaved() {
  hasUnsavedChanges = false;
  const btn = document.getElementById('saveBtn');
  if (btn) {
    btn.classList.remove('unsaved');
    btn.textContent = '保存';
  }
}
function manualSave() {
  saveTasks();
  markSaved();
}

let saveTimeout = null;
function saveTasks() {
  if (!currentProjectId) return;

  // Save to localStorage immediately
  localStorage.setItem('gantt_tasks_' + currentProjectId, JSON.stringify(tasks));
  localStorage.setItem('gantt_title_' + currentProjectId, projectTitle);

  // Update project list timestamp
  const projects = getProjectListFromLocal();
  const proj = projects.find(p => p.id === currentProjectId);
  if (proj) {
    proj.updatedAt = Date.now();
    proj.name = projectTitle !== 'プロジェクト名を入力' ? projectTitle : proj.name;
    saveProjectListToLocal(projects);
  }

  // Debounced save to Firebase
  if (firebaseEnabled && db) {
    clearTimeout(saveTimeout);
    saveTimeout = setTimeout(() => {
      setSyncStatus('syncing');
      ignoreNextFirebaseUpdate = true;
      db.ref('projects/' + currentProjectId).set({
        tasks: tasks,
        title: projectTitle,
        updatedAt: firebase.database.ServerValue.TIMESTAMP
      }).then(() => {
        setSyncStatus('connected');
      }).catch((err) => {
        console.error('Firebase save error:', err);
        setSyncStatus('offline');
        ignoreNextFirebaseUpdate = false;
      });
    }, 500);
  }
}

function getChildren(parentId) {
  return tasks.filter(t => (t.parentId || null) === parentId);
}

function getVisibleTasks() {
  const result = [];
  const roots = tasks.filter(t => !t.parentId);
  function walk(list) {
    for (const t of list) {
      result.push(t);
      if (!t.collapsed) {
        walk(getChildren(t.id));
      }
    }
  }
  walk(roots);
  return result;
}

// ========== CALENDAR ==========
let viewStartDate;
let totalDays = 120;

function initCalendar() {
  const today = new Date();
  viewStartDate = new Date(today.getFullYear(), today.getMonth(), 1);
}

function getDayInfo(date) {
  const ds = date.toISOString().slice(0,10);
  const dow = date.getDay();
  const holiday = JAPANESE_HOLIDAYS[ds];
  const today = new Date();
  const isToday = ds === today.toISOString().slice(0,10);
  return { date, dateStr: ds, dow, holiday, isToday };
}

function getDays() {
  const days = [];
  for (let i = 0; i < totalDays; i++) {
    const d = new Date(viewStartDate);
    d.setDate(d.getDate() + i);
    days.push(getDayInfo(d));
  }
  return days;
}

const DOW_NAMES = ['日','月','火','水','木','金','土'];

// ========== RENDER ==========
function render() {
  const visible = getVisibleTasks();
  const days = getDays();

  renderSidebar(visible);
  renderAddColumn(visible);
  renderTimeline(visible, days);
  if (viewMode === 'vertical') renderVertical();
  markUnsaved();
  updateMonthLabel();
}

function updateMonthLabel() {
  const label = document.getElementById('currentMonthLabel');
  const y = viewStartDate.getFullYear();
  const m = viewStartDate.getMonth() + 1;
  label.textContent = `${y}年${m}月`;
}

function renderSidebar(visible) {
  const container = document.getElementById('sidebarBody');
  container.innerHTML = '';
  visible.forEach((task, idx) => {
    const row = document.createElement('div');
    row.className = `task-row ${task.type === 'phase' ? 'is-phase' : 'is-task'}`;
    row.dataset.taskId = task.id;
    row.dataset.index = idx;

    // Make row draggable for reordering
    row.draggable = true;
    row.addEventListener('dragstart', (e) => onRowDragStart(e, task));
    row.addEventListener('dragover', onRowDragOver);
    row.addEventListener('dragleave', onRowDragLeave);
    row.addEventListener('drop', onRowDrop);
    row.addEventListener('dragend', onRowDragEnd);

    const colorDiv = document.createElement('div');
    colorDiv.className = 'task-color';
    colorDiv.style.background = task.color;
    row.appendChild(colorDiv);

    const children = getChildren(task.id);
    if (children.length > 0) {
      const toggle = document.createElement('div');
      toggle.className = 'task-toggle';
      toggle.textContent = task.collapsed ? '▶' : '▼';
      toggle.onclick = () => { task.collapsed = !task.collapsed; render(); };
      row.appendChild(toggle);
    } else {
      const spacer = document.createElement('div');
      spacer.style.width = '20px';
      spacer.style.flexShrink = '0';
      row.appendChild(spacer);
    }

    const label = document.createElement('div');
    label.className = 'task-label editable';
    label.textContent = task.name;
    label.ondblclick = () => startRename(task);
    row.appendChild(label);

    const actions = document.createElement('div');
    actions.className = 'task-actions';
    const addBtn = document.createElement('button');
    addBtn.textContent = '＋';
    addBtn.title = '子タスク追加';
    addBtn.onclick = (e) => { e.stopPropagation(); addChildTask(task); };
    actions.appendChild(addBtn);
    const delBtn = document.createElement('button');
    delBtn.className = 'delete';
    delBtn.textContent = '×';
    delBtn.title = '削除';
    delBtn.onclick = (e) => { e.stopPropagation(); deleteTask(task.id); };
    actions.appendChild(delBtn);
    row.appendChild(actions);

    row.addEventListener('contextmenu', (e) => {
      e.preventDefault();
      showContextMenu(e, task);
    });

    container.appendChild(row);
  });
}

function renderAddColumn(visible) {
  const container = document.getElementById('addColumnBody');
  if (!container) return;
  container.innerHTML = '';
  visible.forEach(task => {
    const row = document.createElement('div');
    row.className = 'add-column-row';
    const btn = document.createElement('div');
    btn.className = 'bar-add-btn';
    btn.textContent = '＋';
    btn.title = 'スケジュール追加';
    btn.onclick = () => {
      if (!task.bars) task.bars = [];
      const days = getDays();
      const lastBar = task.bars.length > 0 ? task.bars[task.bars.length - 1] : null;
      let startDay = 0;
      if (lastBar && lastBar.end) {
        const lastEndIdx = days.findIndex(d => d.dateStr === lastBar.end);
        startDay = lastEndIdx >= 0 ? lastEndIdx + 2 : 0;
      }
      if (startDay >= days.length) startDay = Math.max(0, days.length - 7);
      const endDay = Math.min(startDay + 6, days.length - 1);
      task.bars.push({ start: days[startDay].dateStr, end: days[endDay].dateStr });
      render();
    };
    row.appendChild(btn);
    container.appendChild(row);
  });

  // Sync scroll with sidebar
  const sidebarBody = document.getElementById('sidebarBody');
  const wrapper = document.getElementById('timelineWrapper');
  if (wrapper) {
    const syncScroll = () => { container.scrollTop = wrapper.scrollTop; };
    wrapper.addEventListener('scroll', syncScroll);
  }
}

function renderTimeline(visible, days) {
  const header = document.getElementById('timelineHeader');
  const body = document.getElementById('timelineBody');

  // Build month ranges
  let currentMonth = -1;
  let monthStart = 0;
  const monthRanges = [];
  days.forEach((d, i) => {
    const m = d.date.getMonth();
    if (m !== currentMonth) {
      if (currentMonth !== -1) {
        monthRanges.push({ month: currentMonth, year: days[monthStart].date.getFullYear(), count: i - monthStart });
      }
      currentMonth = m;
      monthStart = i;
    }
  });
  monthRanges.push({ month: currentMonth, year: days[monthStart].date.getFullYear(), count: days.length - monthStart });

  // Track which day indices are the first day of a new month
  const monthStartIndices = new Set();
  let prevMonth = -1;
  days.forEach((d, i) => {
    const m = d.date.getMonth();
    if (m !== prevMonth && i > 0) monthStartIndices.add(i);
    prevMonth = m;
  });

  // Build header as a table so month and day columns share exact widths
  let tableHtml = '<table class="timeline-table"><tr>';
  for (const mr of monthRanges) {
    tableHtml += `<th class="month-cell" colspan="${mr.count}">${mr.year}/${mr.month+1}月</th>`;
  }
  tableHtml += '</tr><tr>';
  for (let i = 0; i < days.length; i++) {
    const d = days[i];
    let cls = 'day-cell';
    if (d.holiday) cls += ' holiday';
    else if (d.dow === 0) cls += ' sunday';
    else if (d.dow === 6) cls += ' saturday';
    if (d.isToday) cls += ' today';
    if (monthStartIndices.has(i)) cls += ' month-start';
    const title = d.holiday ? d.holiday : '';
    tableHtml += `<th class="${cls}" title="${title}"><span class="day-num">${d.date.getDate()}</span><span class="day-name">${DOW_NAMES[d.dow]}</span></th>`;
  }
  tableHtml += '</tr></table>';
  header.innerHTML = tableHtml;

  // Measure actual cell positions from the rendered table
  const dayCells = header.querySelectorAll('.day-cell');
  const cellW = dayCells.length > 0 ? dayCells[0].offsetWidth : 36;
  const totalW = days.length * cellW;
  body.style.width = totalW + 'px';
  body.innerHTML = '';

  const todayIdx = days.findIndex(d => d.isToday);
  if (todayIdx >= 0) {
    const line = document.createElement('div');
    line.className = 'today-line';
    line.style.left = (todayIdx * cellW + cellW / 2) + 'px';
    line.style.height = (visible.length * parseInt(getComputedStyle(document.documentElement).getPropertyValue('--row-height'))) + 'px';
    body.appendChild(line);
  }

  visible.forEach((task) => {
    const row = document.createElement('div');
    row.className = 'timeline-row';

    days.forEach((d, i) => {
      const cell = document.createElement('div');
      cell.className = 'timeline-cell';
      if (d.holiday) cell.classList.add('holiday');
      else if (d.dow === 0) cell.classList.add('sunday');
      else if (d.dow === 6) cell.classList.add('saturday');
      if (d.isToday) cell.classList.add('today');
      if (monthStartIndices.has(i)) cell.classList.add('month-start');
      row.appendChild(cell);
    });

    // Render multiple bars
    const bars = task.bars || [];
    bars.forEach((b, bIdx) => {
      if (!b.start || !b.end) return;
      const startIdx = days.findIndex(d => d.dateStr === b.start);
      const endIdx = days.findIndex(d => d.dateStr === b.end);
      if (startIdx >= 0 || endIdx >= 0) {
        const si = Math.max(startIdx, 0);
        const ei = endIdx >= 0 ? endIdx : days.length - 1;
        const barEl = document.createElement('div');
        barEl.className = 'gantt-bar';
        barEl.style.left = (si * cellW + 2) + 'px';
        barEl.style.width = ((ei - si + 1) * cellW - 4) + 'px';
        barEl.style.background = task.color;
        barEl.dataset.taskId = task.id;
        barEl.dataset.barIndex = bIdx;

        const label = document.createElement('span');
        label.className = 'bar-label';
        label.textContent = bIdx === 0 ? task.name : '';
        barEl.appendChild(label);

        // Delete button
        const del = document.createElement('div');
        del.className = 'bar-delete';
        del.textContent = '×';
        del.addEventListener('mousedown', (e) => {
          e.preventDefault();
          e.stopPropagation();
        });
        del.addEventListener('click', (e) => {
          e.stopPropagation();
          task.bars.splice(bIdx, 1);
          render();
        });
        barEl.appendChild(del);

        const rl = document.createElement('div');
        rl.className = 'bar-resize-left';
        barEl.appendChild(rl);
        const rr = document.createElement('div');
        rr.className = 'bar-resize-right';
        barEl.appendChild(rr);

        barEl.addEventListener('mousedown', (e) => {
          if (e.target.classList.contains('bar-delete')) return;
          startBarDrag(e, task, bIdx, days, cellW);
        });
        row.appendChild(barEl);
      }
    });


    body.appendChild(row);
  });

  const wrapper = document.getElementById('timelineWrapper');
  const sidebarBody = document.getElementById('sidebarBody');
  wrapper.onscroll = () => {
    sidebarBody.scrollTop = wrapper.scrollTop;
  };
}

// ========== BAR DRAGGING ==========
let dragState = null;

function startBarDrag(e, task, barIndex, days, cellW) {
  if (e.button !== 0) return;
  e.preventDefault();
  e.stopPropagation();

  const barEl = e.currentTarget;
  const b = task.bars[barIndex];
  const isLeftResize = e.target.classList.contains('bar-resize-left');
  const isRightResize = e.target.classList.contains('bar-resize-right');

  dragState = {
    task, barIndex, days, cellW,
    mode: isLeftResize ? 'resize-left' : isRightResize ? 'resize-right' : 'move',
    startX: e.clientX,
    origStart: b.start,
    origEnd: b.end,
    bar: barEl
  };

  document.addEventListener('mousemove', onBarDrag);
  document.addEventListener('mouseup', onBarDragEnd);
}

function onBarDrag(e) {
  if (!dragState) return;
  const { task, barIndex, days, cellW, mode, startX, origStart, origEnd, bar } = dragState;
  const b = task.bars[barIndex];
  const dx = e.clientX - startX;
  const dayCells = Math.round(dx / cellW);
  if (dayCells === 0) return;

  const origStartIdx = days.findIndex(d => d.dateStr === origStart);
  const origEndIdx = days.findIndex(d => d.dateStr === origEnd);
  if (origStartIdx < 0 || origEndIdx < 0) return;

  if (mode === 'move') {
    const newStart = Math.max(0, Math.min(days.length - (origEndIdx - origStartIdx) - 1, origStartIdx + dayCells));
    const newEnd = newStart + (origEndIdx - origStartIdx);
    b.start = days[newStart].dateStr;
    b.end = days[newEnd].dateStr;
    bar.style.left = (newStart * cellW + 2) + 'px';
  } else if (mode === 'resize-left') {
    const newStart = Math.max(0, Math.min(origEndIdx, origStartIdx + dayCells));
    b.start = days[newStart].dateStr;
    bar.style.left = (newStart * cellW + 2) + 'px';
    bar.style.width = ((origEndIdx - newStart + 1) * cellW - 4) + 'px';
  } else if (mode === 'resize-right') {
    const newEnd = Math.max(origStartIdx, Math.min(days.length - 1, origEndIdx + dayCells));
    b.end = days[newEnd].dateStr;
    bar.style.width = ((newEnd - origStartIdx + 1) * cellW - 4) + 'px';
  }
}

function onBarDragEnd() {
  dragState = null;
  document.removeEventListener('mousemove', onBarDrag);
  document.removeEventListener('mouseup', onBarDragEnd);
  render();
}

// ========== DRAG & DROP (PALETTE + REORDER) ==========
let dragSource = null; // { type: 'palette', itemType } or { type: 'row', task }

function onPaletteDragStart(e, type) {
  dragSource = { type: 'palette', itemType: type };
  e.dataTransfer.effectAllowed = 'copyMove';
  e.dataTransfer.setData('text/plain', 'palette:' + type);
}

function onRowDragStart(e, task) {
  dragSource = { type: 'row', task };
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', 'row:' + task.id);
  e.currentTarget.classList.add('dragging');
}

function onRowDragEnd(e) {
  e.currentTarget.classList.remove('dragging');
  dragSource = null;
  clearDropIndicators();
}

function clearDropIndicators() {
  document.querySelectorAll('.drop-target-above,.drop-target-below,.drop-target-inside').forEach(el => {
    el.classList.remove('drop-target-above', 'drop-target-below', 'drop-target-inside');
  });
}

function getDropPosition(e, row) {
  const rect = row.getBoundingClientRect();
  const y = e.clientY - rect.top;
  const ratio = y / rect.height;
  if (ratio < 0.3) return 'above';
  if (ratio > 0.7) return 'below';
  return 'inside';
}

function onRowDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = dragSource && dragSource.type === 'row' ? 'move' : 'copy';
  clearDropIndicators();
  const pos = getDropPosition(e, e.currentTarget);
  e.currentTarget.classList.add('drop-target-' + pos);
}

function onRowDragLeave(e) {
  e.currentTarget.classList.remove('drop-target-above', 'drop-target-below', 'drop-target-inside');
}

function onRowDrop(e) {
  e.preventDefault();
  clearDropIndicators();
  const targetId = parseInt(e.currentTarget.dataset.taskId);
  const targetTask = tasks.find(t => t.id === targetId);
  if (!targetTask) return;
  const pos = getDropPosition(e, e.currentTarget);

  if (dragSource && dragSource.type === 'row') {
    // Reorder existing task
    const movedTask = dragSource.task;
    if (movedTask.id === targetTask.id) return;
    // Prevent dropping a parent into its own child
    let check = targetTask;
    while (check) {
      if (check.id === movedTask.id) return;
      check = tasks.find(t => t.id === check.parentId);
    }

    // Collect moved task and its descendants
    const movedIds = new Set();
    function collectIds(id) {
      movedIds.add(id);
      getChildren(id).forEach(c => collectIds(c.id));
    }
    collectIds(movedTask.id);
    const movedItems = tasks.filter(t => movedIds.has(t.id));
    tasks = tasks.filter(t => !movedIds.has(t.id));

    const targetIdx = tasks.indexOf(targetTask);

    if (pos === 'above') {
      movedTask.parentId = targetTask.parentId;
      tasks.splice(targetIdx, 0, ...movedItems);
    } else if (pos === 'below') {
      // Insert after target and all its descendants
      let insertIdx = targetIdx + 1;
      const targetDescendants = new Set();
      function collectTarget(id) { targetDescendants.add(id); getChildren(id).forEach(c => collectTarget(c.id)); }
      // recalculate children from current tasks array
      function getCh(pid) { return tasks.filter(t => t.parentId === pid); }
      function collectT(id) { targetDescendants.add(id); getCh(id).forEach(c => collectT(c.id)); }
      collectT(targetTask.id);
      while (insertIdx < tasks.length && targetDescendants.has(tasks[insertIdx].id)) insertIdx++;
      movedTask.parentId = targetTask.parentId;
      tasks.splice(insertIdx, 0, ...movedItems);
    } else {
      // inside: make child of target
      movedTask.parentId = targetTask.id;
      targetTask.collapsed = false;
      const children = tasks.filter(t => t.parentId === targetTask.id);
      const lastChildIdx = children.length > 0 ? tasks.indexOf(children[children.length - 1]) : targetIdx;
      tasks.splice(lastChildIdx + 1, 0, ...movedItems);
    }
    render();
  } else {
    // Palette drop: create new item
    const data = e.dataTransfer.getData('text/plain');
    const type = data.replace('palette:', '');
    const newTask = {
      id: makeId(),
      name: type === 'phase' ? '新しいフェーズ' : '新しいタスク',
      type,
      color: COLORS[Math.floor(Math.random() * COLORS.length)],
      bars: [],
      collapsed: false,
      parentId: null
    };

    if (pos === 'inside' && type === 'task') {
      newTask.parentId = targetTask.type === 'phase' ? targetTask.id : targetTask.parentId;
    } else if (pos === 'above') {
      newTask.parentId = type === 'task' ? (targetTask.type === 'phase' ? targetTask.parentId : targetTask.parentId) : null;
    } else {
      newTask.parentId = type === 'task' ? (targetTask.type === 'phase' ? targetTask.id : targetTask.parentId) : null;
    }

    const targetIdx = tasks.indexOf(targetTask);
    if (pos === 'above') {
      tasks.splice(targetIdx, 0, newTask);
    } else if (pos === 'inside' && targetTask.type === 'phase') {
      targetTask.collapsed = false;
      const children = getChildren(targetTask.id);
      const lastChild = children.length > 0 ? tasks.indexOf(children[children.length - 1]) : targetIdx;
      tasks.splice(lastChild + 1, 0, newTask);
    } else {
      tasks.splice(targetIdx + 1, 0, newTask);
    }
    render();
    setTimeout(() => startRename(newTask), 100);
  }
  dragSource = null;
}

// ========== TASK OPERATIONS ==========
function addChildTask(parent) {
  const newTask = {
    id: makeId(),
    name: '新しいタスク',
    type: 'task',
    color: parent.color,
    start: null, end: null,
    collapsed: false,
    parentId: parent.id
  };
  parent.collapsed = false;
  const children = getChildren(parent.id);
  const insertIdx = children.length > 0
    ? tasks.indexOf(children[children.length - 1]) + 1
    : tasks.indexOf(parent) + 1;
  tasks.splice(insertIdx, 0, newTask);
  render();
  setTimeout(() => startRename(newTask), 100);
}

function deleteTask(id) {
  const toDelete = new Set();
  function collect(tid) {
    toDelete.add(tid);
    getChildren(tid).forEach(c => collect(c.id));
  }
  collect(id);
  tasks = tasks.filter(t => !toDelete.has(t.id));
  render();
}

function startRename(task) {
  const row = document.querySelector(`.task-row[data-task-id="${task.id}"]`);
  if (!row) return;
  const label = row.querySelector('.task-label');
  const input = document.createElement('input');
  input.value = task.name;
  input.style.cssText = 'width:100%;border:1px solid #1a1a2e;border-radius:4px;padding:2px 6px;font-size:inherit;outline:none;font-family:inherit;background:#FCFCF3;';
  label.textContent = '';
  label.appendChild(input);
  input.focus();
  input.select();

  const finish = () => {
    task.name = input.value.trim() || task.name;
    render();
  };
  input.onblur = finish;
  input.onkeydown = (e) => {
    if (e.key === 'Enter') finish();
    if (e.key === 'Escape') { input.value = task.name; finish(); }
  };
}

// ========== CONTEXT MENU ==========
let ctxTask = null;

function showContextMenu(e, task) {
  ctxTask = task;
  const menu = document.getElementById('contextMenu');
  menu.style.left = e.clientX + 'px';
  menu.style.top = e.clientY + 'px';
  menu.classList.add('show');

  const picker = document.getElementById('colorPicker');
  picker.innerHTML = '';
  COLORS.forEach(c => {
    const swatch = document.createElement('div');
    swatch.className = 'color-swatch';
    swatch.style.background = c;
    if (c === task.color) swatch.style.borderColor = '#1a1a2e';
    swatch.onclick = () => {
      task.color = c;
      getChildren(task.id).forEach(ch => ch.color = c);
      menu.classList.remove('show');
      render();
    };
    picker.appendChild(swatch);
  });

  document.addEventListener('click', hideContextMenu);
}

function hideContextMenu() {
  document.getElementById('contextMenu').classList.remove('show');
  document.removeEventListener('click', hideContextMenu);
}

function ctxAction(action) {
  hideContextMenu();
  if (!ctxTask) return;
  switch(action) {
    case 'addChild': addChildTask(ctxTask); break;
    case 'addBelow': {
      const newTask = {
        id: makeId(),
        name: '新しい項目',
        type: ctxTask.type,
        color: ctxTask.color,
        bars: [],
        collapsed: false,
        parentId: ctxTask.parentId
      };
      const idx = tasks.indexOf(ctxTask);
      tasks.splice(idx + 1, 0, newTask);
      render();
      setTimeout(() => startRename(newTask), 100);
      break;
    }
    case 'rename': startRename(ctxTask); break;
    case 'delete': deleteTask(ctxTask.id); break;
    case 'setDates': showDateModal(ctxTask); break;
  }
}

// ========== MODAL ==========
let modalCallback = null;

function showDateModal(task) {
  const overlay = document.getElementById('modalOverlay');
  if (!task.bars) task.bars = [];
  document.getElementById('modalTitle').textContent = `期間設定: ${task.name}`;

  let barsHtml = '';
  task.bars.forEach((b, i) => {
    barsHtml += `
      <div style="display:flex;gap:8px;align-items:center;margin-bottom:8px;">
        <div style="flex:1;">
          <label style="font-size:11px;color:#888;font-weight:500;">開始日</label>
          <input type="date" class="modal-bar-start" data-idx="${i}" value="${b.start || ''}" style="margin-bottom:4px;">
        </div>
        <div style="flex:1;">
          <label style="font-size:11px;color:#888;font-weight:500;">終了日</label>
          <input type="date" class="modal-bar-end" data-idx="${i}" value="${b.end || ''}" style="margin-bottom:4px;">
        </div>
        <button onclick="removeBarFromModal(${i})" style="border:none;background:none;color:#e74c3c;cursor:pointer;font-size:16px;padding:4px;" title="削除">×</button>
      </div>`;
  });
  if (task.bars.length === 0) {
    barsHtml += `
      <div style="display:flex;gap:8px;align-items:center;margin-bottom:8px;">
        <div style="flex:1;">
          <label style="font-size:11px;color:#888;font-weight:500;">開始日</label>
          <input type="date" class="modal-bar-start" data-idx="new" value="">
        </div>
        <div style="flex:1;">
          <label style="font-size:11px;color:#888;font-weight:500;">終了日</label>
          <input type="date" class="modal-bar-end" data-idx="new" value="">
        </div>
      </div>`;
  }
  barsHtml += `<button onclick="addBarToModal()" style="font-size:12px;color:var(--primary);background:none;border:1px dashed var(--border);border-radius:6px;padding:4px 12px;cursor:pointer;width:100%;margin-top:4px;">＋ スケジュールを追加</button>`;

  document.getElementById('modalContent').innerHTML = barsHtml;
  window._modalTask = task;
  modalCallback = () => {
    const starts = document.querySelectorAll('.modal-bar-start');
    const ends = document.querySelectorAll('.modal-bar-end');
    const newBars = [];
    starts.forEach((inp, i) => {
      const s = inp.value;
      const e = ends[i] ? ends[i].value : '';
      if (s && e) newBars.push({ start: s, end: e });
    });
    task.bars = newBars;
    render();
  };
  overlay.classList.add('show');
}

function addBarToModal() {
  const content = document.getElementById('modalContent');
  const addBtn = content.querySelector('button:last-child');
  const div = document.createElement('div');
  div.style.cssText = 'display:flex;gap:8px;align-items:center;margin-bottom:8px;';
  div.innerHTML = `
    <div style="flex:1;">
      <label style="font-size:11px;color:#888;font-weight:500;">開始日</label>
      <input type="date" class="modal-bar-start" data-idx="new" value="">
    </div>
    <div style="flex:1;">
      <label style="font-size:11px;color:#888;font-weight:500;">終了日</label>
      <input type="date" class="modal-bar-end" data-idx="new" value="">
    </div>
    <button onclick="this.parentElement.remove()" style="border:none;background:none;color:#e74c3c;cursor:pointer;font-size:16px;padding:4px;" title="削除">×</button>`;
  content.insertBefore(div, addBtn);
}

function removeBarFromModal(idx) {
  if (window._modalTask && window._modalTask.bars) {
    window._modalTask.bars.splice(idx, 1);
    showDateModal(window._modalTask);
  }
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('show');
  modalCallback = null;
}

function modalOkAction() {
  if (modalCallback) modalCallback();
  closeModal();
}

// ========== VIEW MODE ==========
let viewMode = 'horizontal';

function setViewMode(mode) {
  viewMode = mode;
  document.getElementById('btnHorizontal').classList.toggle('active', mode === 'horizontal');
  document.getElementById('btnVertical').classList.toggle('active', mode === 'vertical');
  document.getElementById('ganttContainer').classList.toggle('hidden', mode === 'vertical');
  document.getElementById('verticalView').classList.toggle('active', mode === 'vertical');
  if (mode === 'vertical') {
    renderVertical();
  }
}

function renderVertical() {
  const container = document.getElementById('verticalView');
  const visible = getVisibleTasks();
  const days = getDays();

  // Build flat list of leaf tasks (with phase info)
  const columns = [];
  visible.forEach(t => {
    columns.push(t);
  });

  let html = '<table class="v-table"><thead>';

  // Phase grouping row
  html += '<tr><th class="v-date-header" rowspan="2">日付</th>';
  let i = 0;
  while (i < columns.length) {
    const col = columns[i];
    if (col.type === 'phase') {
      // Count children in visible list
      let childCount = 0;
      for (let j = i + 1; j < columns.length; j++) {
        if (columns[j].parentId === col.id) childCount++;
        else if (columns[j].type === 'phase') break;
      }
      if (childCount > 0) {
        html += `<th class="v-phase" colspan="${childCount}" style="background:${col.color};">${col.name}</th>`;
        i++; // skip phase row itself in next row
        continue;
      } else {
        html += `<th class="v-phase" rowspan="2" style="background:${col.color};">${col.name}</th>`;
        i++;
        continue;
      }
    }
    // standalone task without phase parent
    if (!col.parentId || !columns.find(c => c.id === col.parentId)) {
      html += `<th class="v-task" rowspan="2">${col.name}</th>`;
    }
    i++;
  }
  html += '</tr>';

  // Sub-task header row
  html += '<tr>';
  columns.forEach((col, idx) => {
    if (col.type === 'task' && col.parentId) {
      const parent = columns.find(c => c.id === col.parentId);
      if (parent) {
        html += `<th class="v-task" style="border-top:3px solid ${col.color};">${col.name}</th>`;
      }
    }
  });
  html += '</tr></thead><tbody>';

  // Date rows
  const today = new Date().toISOString().slice(0, 10);
  days.forEach(d => {
    const isToday = d.dateStr === today;
    let dateCls = 'v-date-cell';
    if (d.holiday) dateCls += ' holiday';
    else if (d.dow === 0) dateCls += ' sunday';
    else if (d.dow === 6) dateCls += ' saturday';
    if (isToday) dateCls += ' today';

    const rowCls = isToday ? ' class="v-today-row"' : '';
    const holidayLabel = d.holiday ? ` (${d.holiday})` : '';
    html += `<tr${rowCls}>`;
    html += `<td class="${dateCls}">${d.date.getMonth()+1}/${d.date.getDate()} (${DOW_NAMES[d.dow]})${holidayLabel}</td>`;

    // Columns: skip phase rows that have children
    columns.forEach(col => {
      // Skip phases that have visible children (they're just group headers)
      if (col.type === 'phase') {
        const hasVisibleChildren = columns.some(c => c.parentId === col.id);
        if (hasVisibleChildren) return;
      }

      let cellCls = 'v-bar-cell';
      if (d.holiday) cellCls += ' holiday-bg';
      else if (d.dow === 0) cellCls += ' sunday-bg';
      else if (d.dow === 6) cellCls += ' saturday-bg';
      if (isToday) cellCls += ' today-bg';

      const colBars = col.bars || [];
      const inRange = colBars.some(b => b.start && b.end && d.dateStr >= b.start && d.dateStr <= b.end);
      if (inRange) {
        html += `<td class="${cellCls}"><div class="v-bar-fill" style="background:${col.color};"></div></td>`;
      } else {
        html += `<td class="${cellCls}"></td>`;
      }
    });
    html += '</tr>';
  });

  html += '</tbody></table>';
  container.innerHTML = html;
}

// ========== NAV ==========
function navMonth(dir) {
  viewStartDate.setMonth(viewStartDate.getMonth() + dir);
  render();
}

function goToday() {
  const today = new Date();
  viewStartDate = new Date(today.getFullYear(), today.getMonth(), 1);
  render();
  setTimeout(() => {
    const days = getDays();
    const todayIdx = days.findIndex(d => d.isToday);
    if (todayIdx >= 0) {
      const cellW = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--cell-width'));
      document.getElementById('timelineWrapper').scrollLeft = Math.max(0, todayIdx * cellW - 200);
    }
  }, 50);
}

// ========== PROJECT TITLE ==========
let projectTitle = 'プロジェクト名を入力';

function renderTitle() {
  const el = document.getElementById('projectTitle');
  el.textContent = projectTitle;
  document.title = projectTitle + ' - GROW UP Schedule';
}

function startEditTitle() {
  const el = document.getElementById('projectTitle');
  const input = document.createElement('input');
  input.className = 'project-title-input';
  input.value = projectTitle === 'プロジェクト名を入力' ? '' : projectTitle;
  input.placeholder = 'プロジェクト名を入力';
  el.replaceWith(input);
  input.focus();
  input.select();

  const finish = () => {
    projectTitle = input.value.trim() || 'プロジェクト名を入力';
    markUnsaved(); // mark as unsaved, user clicks save button
    const h2 = document.createElement('h2');
    h2.id = 'projectTitle';
    h2.className = 'project-title';
    h2.ondblclick = startEditTitle;
    h2.title = 'ダブルクリックで編集';
    h2.textContent = projectTitle;
    input.replaceWith(h2);
    document.title = projectTitle + ' - GROW UP Schedule';
  };
  input.onblur = finish;
  input.onkeydown = (e) => {
    if (e.key === 'Enter') input.blur();
    if (e.key === 'Escape') { input.value = projectTitle; input.blur(); }
  };
}

// ========== EXPORT / IMPORT ==========
function exportData() {
  const data = JSON.stringify(tasks, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'schedule_' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
}

function importData() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.onchange = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        tasks = JSON.parse(ev.target.result);
        nextId = Math.max(...tasks.map(t => t.id)) + 1;
        render();
        manualSave();
      } catch(err) {
        alert('ファイルの読み込みに失敗しました');
      }
    };
    reader.readAsText(file);
  };
  input.click();
}

// ========== INIT ==========
initFirebase();

// Check URL hash for project ID
function initFromHash() {
  const hash = window.location.hash;
  if (hash && hash.startsWith('#/')) {
    const projectId = hash.slice(2);
    if (projectId) {
      // Check if project exists in local list, if not add it
      const projects = getProjectListFromLocal();
      if (!projects.find(p => p.id === projectId)) {
        projects.push({
          id: projectId,
          name: projectId,
          createdAt: Date.now(),
          updatedAt: Date.now()
        });
        saveProjectListToLocal(projects);
      }
      openProject(projectId);
      return;
    }
  }
  // No project in URL — show selector
  showProjectSelector();
}

// Listen for hash changes (back/forward navigation)
window.addEventListener('hashchange', () => {
  const hash = window.location.hash;
  if (!hash || hash === '#' || hash === '#/') {
    backToProjects();
  } else if (hash.startsWith('#/')) {
    const id = hash.slice(2);
    if (id && id !== currentProjectId) {
      openProject(id);
    }
  }
});

initFromHash();

// Warn before leaving with unsaved changes
window.addEventListener('beforeunload', (e) => {
  if (hasUnsavedChanges) {
    e.preventDefault();
    e.returnValue = '';
  }
});
</script>
